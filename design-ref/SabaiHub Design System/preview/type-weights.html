<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 16px; background: hsl(var(--background)); font-family: var(--font-sans); }
.row { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
.label { font-size: 10px; color: hsl(var(--muted-foreground)); font-family: var(--font-mono); width: 80px; flex-shrink: 0; }
.sample { font-size: 16px; color: hsl(var(--foreground)); }
</style>
</head><body>
<div class="row"><span class="label">300 · Light</span><span class="sample" style="font-weight:300;">Book appointment</span></div>
<div class="row"><span class="label">400 · Normal</span><span class="sample" style="font-weight:400;">Book appointment</span></div>
<div class="row"><span class="label">500 · Medium</span><span class="sample" style="font-weight:500;">Book appointment</span></div>
<div class="row"><span class="label">600 · Semibold</span><span class="sample" style="font-weight:600;">Book appointment</span></div>
<div class="row"><span class="label">700 · Bold</span><span class="sample" style="font-weight:700;">Book appointment</span></div>
</body></html>
