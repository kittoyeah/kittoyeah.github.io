<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 16px; background: hsl(var(--background)); font-family: var(--font-sans); }
.row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; }
.title { font-size: 10px; font-weight: 600; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
button {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 16px;
  height: 36px;
  border-radius: 6px;
  transition: opacity 0.15s;
}
button:hover { opacity: 0.9; }
.btn-primary { background: hsl(140,35%,35%); color: hsl(40,15%,95%); }
.btn-secondary { background: hsl(100,15%,86%); color: hsl(140,35%,25%); }
.btn-destructive { background: hsl(0,60%,50%); color: hsl(40,20%,98%); }
.btn-outline { background: transparent; color: hsl(140,30%,15%); border: 1px solid hsl(100,10%,82%); }
.btn-ghost { background: transparent; color: hsl(140,30%,15%); }
.btn-ghost:hover { background: hsl(35,35%,80%); }
.btn-sm { height: 28px; font-size: 12px; padding: 0 10px; }
.btn-lg { height: 44px; font-size: 15px; padding: 0 28px; }
.btn-icon { width: 36px; padding: 0; justify-content: center; }
</style>
</head><body>
<div class="title">Variants</div>
<div class="row">
  <button class="btn-primary">Book appointment</button>
  <button class="btn-secondary">View details</button>
  <button class="btn-destructive">Delete</button>
  <button class="btn-outline">Outline</button>
  <button class="btn-ghost">Ghost</button>
</div>
<div class="title">Sizes</div>
<div class="row">
  <button class="btn-primary btn-sm">Small</button>
  <button class="btn-primary">Default</button>
  <button class="btn-primary btn-lg">Large</button>
  <button class="btn-primary btn-icon">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>
<div class="title">States</div>
<div class="row">
  <button class="btn-primary" style="opacity:0.5;cursor:not-allowed;">Disabled</button>
  <button class="btn-primary" style="outline:2px solid hsl(140,35%,35%);outline-offset:2px;">Focused</button>
  <button class="btn-outline" style="background:hsl(35,35%,80%);">Hover</button>
</div>
</body></html>
