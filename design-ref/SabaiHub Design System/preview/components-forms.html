<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 16px; background: hsl(var(--background)); font-family: var(--font-sans); }
.title { font-size: 10px; font-weight: 600; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.form-group { margin-bottom: 12px; }
label { display: block; font-size: 12px; font-weight: 500; color: hsl(var(--foreground)); margin-bottom: 4px; }
input, select, textarea {
  width: 100%; box-sizing: border-box;
  font-family: var(--font-sans); font-size: 14px;
  background: hsl(40,15%,97%); color: hsl(140,30%,15%);
  border: 1px solid hsl(100,10%,82%); border-radius: 6px;
  padding: 7px 10px; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus, select:focus { border-color: hsl(140,35%,35%); box-shadow: 0 0 0 2px hsla(140,35%,35%,0.15); }
.hint { font-size: 11px; color: hsl(var(--muted-foreground)); margin-top: 3px; }
.error-input { border-color: hsl(0,60%,50%) !important; }
.error-msg { font-size: 11px; color: hsl(0,60%,50%); margin-top: 3px; }
.switch-row { display:flex; align-items:center; gap:10px; }
.switch { width:36px; height:20px; background:hsl(140,35%,35%); border-radius:9999px; position:relative; cursor:pointer; flex-shrink:0; }
.switch::after { content:''; position:absolute; top:2px; right:2px; width:16px; height:16px; background:#fff; border-radius:50%; }
</style>
</head><body>
<div class="form-group">
  <label>Client name</label>
  <input type="text" value="Somchai Wongsawat" />
</div>
<div class="form-group">
  <label>Service</label>
  <select><option>Thai massage — 60 min</option><option>Swedish massage — 90 min</option></select>
</div>
<div class="form-group">
  <label>Notes</label>
  <input type="text" placeholder="Add a note..." />
  <div class="hint">Optional — visible to therapist only</div>
</div>
<div class="form-group">
  <label>Email</label>
  <input type="email" value="bad-email" class="error-input" />
  <div class="error-msg">Enter a valid email address</div>
</div>
<div class="form-group">
  <div class="switch-row">
    <div class="switch"></div>
    <label style="margin:0;">Send SMS reminder</label>
  </div>
</div>
</body></html>
