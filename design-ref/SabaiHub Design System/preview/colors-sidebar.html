<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 16px; background: hsl(var(--background)); font-family: var(--font-sans); }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.swatch { border-radius: 8px; padding: 10px; min-height: 58px; display: flex; flex-direction: column; justify-content: space-between; }
.label { font-size: 10px; font-weight: 600; }
.val { font-size: 9px; opacity: 0.6; font-family: var(--font-mono); margin-top: 4px; }
</style>
</head><body>
<div class="grid">
  <div class="swatch" style="background:hsl(40,15%,91%);color:hsl(140,20%,30%);">
    <span class="label">Sidebar BG</span><span class="val">hsl(40 15% 91%)</span>
  </div>
  <div class="swatch" style="background:hsl(140,20%,30%);color:#fff;">
    <span class="label">Sidebar FG</span><span class="val">hsl(140 20% 30%)</span>
  </div>
  <div class="swatch" style="background:hsl(100,15%,86%);color:hsl(140,35%,25%);">
    <span class="label">Sidebar Accent</span><span class="val">hsl(100 15% 86%)</span>
  </div>
  <div class="swatch" style="background:hsl(140,35%,35%);color:hsl(40,15%,95%);">
    <span class="label">Sidebar Primary</span><span class="val">hsl(140 35% 35%)</span>
  </div>
  <div class="swatch" style="background:hsl(100,10%,80%);color:hsl(140,30%,15%);">
    <span class="label">Sidebar Border</span><span class="val">hsl(100 10% 80%)</span>
  </div>
  <div class="swatch" style="background:hsl(140,30%,4%);color:hsl(100,10%,70%);">
    <span class="label">Sidebar Dark BG</span><span class="val">hsl(140 30% 4%)</span>
  </div>
</div>
</body></html>
