<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SabaiHub — Web App UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Serif:wght@400;600;700&family=Noto+Sans+Mono:wght@400;500;600&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Noto Sans', ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { border-radius: 3px; }
  .light-scroll ::-webkit-scrollbar-thumb { background: hsl(100,10%,80%); }
  .dark-scroll ::-webkit-scrollbar-thumb { background: hsl(140,20%,20%); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Appointments.jsx"></script>
<script type="text/babel" src="Clients.jsx"></script>
<script type="text/babel" src="Calendar.jsx"></script>

<script type="text/babel">
const SCREENS = ['dashboard', 'appointments', 'clients', 'calendar'];

function App() {
  const [screen, setScreen] = React.useState(
    () => localStorage.getItem('sabaihub-screen') || 'dashboard'
  );
  const [collapsed, setCollapsed] = React.useState(false);
  const [dark, setDark] = React.useState(
    () => localStorage.getItem('sabaihub-dark') === 'true'
  );

  React.useEffect(() => { localStorage.setItem('sabaihub-screen', screen); }, [screen]);
  React.useEffect(() => { localStorage.setItem('sabaihub-dark', dark); }, [dark]);

  const handleNav = (id) => { if (SCREENS.includes(id)) setScreen(id); };

  const ScreenContent = () => {
    if (screen === 'dashboard')    return <SabaiDashboard dark={dark} />;
    if (screen === 'appointments') return <SabaiAppointments dark={dark} />;
    if (screen === 'clients')      return <SabaiClients dark={dark} />;
    if (screen === 'calendar')     return <SabaiCalendar dark={dark} />;
    const T = dark ? { canvas: 'hsl(140,30%,5%)', fg: 'hsl(40,20%,90%)', muted: 'hsl(100,10%,48%)' }
                   : { canvas: 'hsl(40,12%,91%)', fg: 'hsl(140,30%,12%)', muted: 'hsl(140,8%,48%)' };
    return (
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', background: T.canvas, color: T.fg, flexDirection: 'column', gap: 10, padding: 40 }}>
        <div style={{ fontSize: 15, fontWeight: 500, color: T.muted }}>
          {screen.charAt(0).toUpperCase() + screen.slice(1)} — coming soon
        </div>
      </div>
    );
  };

  return (
    <div className={dark ? 'dark-scroll' : 'light-scroll'}
      style={{ display: 'flex', height: '100%', overflow: 'hidden', transition: 'background 0.3s' }}>
      <SabaiSidebar active={screen} onNav={handleNav} collapsed={collapsed} dark={dark} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
        <SabaiNavbar
          screen={screen}
          onMenuClick={() => setCollapsed(c => !c)}
          dark={dark}
          onToggleDark={() => setDark(d => !d)}
        />
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex' }}>
          <ScreenContent />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
