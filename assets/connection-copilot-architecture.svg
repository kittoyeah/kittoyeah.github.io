<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="'Space Grotesk', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0d0d0d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B8FE8"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6A6A6A"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- header -->
  <text x="120" y="110" fill="#808080" font-family="'JetBrains Mono', monospace" font-size="22" letter-spacing="6">// MULTI-AGENT ORCHESTRATION</text>
  <text x="120" y="168" fill="#EFEFEF" font-size="50" font-weight="600" letter-spacing="-1">Connection Review Copilot</text>
  <text x="120" y="210" fill="#9A9A9A" font-size="23">Six bounded agents under a deterministic orchestrator. The AI reasons, the orchestrator controls the flow, a human decides.</text>

  <!-- orchestrator bar -->
  <rect x="120" y="262" width="1360" height="92" rx="6" fill="#161e2e" stroke="#5B8FE8" stroke-width="2"/>
  <text x="148" y="304" fill="#5B8FE8" font-family="'JetBrains Mono', monospace" font-size="18" letter-spacing="3">DETERMINISTIC ORCHESTRATOR</text>
  <text x="148" y="336" fill="#EFEFEF" font-size="22">Controls the flow. Auditable. The AI never decides what happens next.</text>
  <text x="1452" y="312" fill="#5B8FE8" font-family="'JetBrains Mono', monospace" font-size="16" text-anchor="end">Step Functions</text>

  <!-- control lines (dashed) from orchestrator down to each agent -->
  <g stroke="#3a5a8a" stroke-dasharray="4 5" stroke-width="1.5" opacity="0.55">
    <line x1="220"  y1="354" x2="220"  y2="436" stroke="#3a5a8a"/>
    <line x1="452"  y1="354" x2="452"  y2="436" stroke="#3a5a8a"/>
    <line x1="684"  y1="354" x2="684"  y2="436" stroke="#3a5a8a"/>
    <line x1="916"  y1="354" x2="916"  y2="436" stroke="#3a5a8a"/>
    <line x1="1148" y1="354" x2="1148" y2="436" stroke="#3a5a8a"/>
    <line x1="1380" y1="354" x2="1380" y2="436" stroke="#3a5a8a"/>
  </g>

  <!-- 6 agents in a pipeline -->
  <g font-family="'JetBrains Mono', monospace">
    <!-- 1 Intake -->
    <rect x="120"  y="436" width="200" height="130" rx="5" fill="#191919" stroke="#3a3a3a" stroke-width="1.5"/>
    <text x="220"  y="486" fill="#6A6A6A" font-size="13" text-anchor="middle">01</text>
    <text x="220"  y="514" fill="#EFEFEF" font-size="19" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="500">Intake</text>
    <text x="220"  y="540" fill="#808080" font-size="13" text-anchor="middle">completeness</text>
    <!-- 2 Environmental -->
    <rect x="352"  y="436" width="200" height="130" rx="5" fill="#191919" stroke="#3a3a3a" stroke-width="1.5"/>
    <text x="452"  y="486" fill="#6A6A6A" font-size="13" text-anchor="middle">02</text>
    <text x="452"  y="514" fill="#EFEFEF" font-size="19" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="500">Environmental</text>
    <text x="452"  y="540" fill="#808080" font-size="13" text-anchor="middle">screen</text>
    <!-- 3 Design Prep -->
    <rect x="584"  y="436" width="200" height="130" rx="5" fill="#191919" stroke="#3a3a3a" stroke-width="1.5"/>
    <text x="684"  y="486" fill="#6A6A6A" font-size="13" text-anchor="middle">03</text>
    <text x="684"  y="514" fill="#EFEFEF" font-size="19" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="500">Design Prep</text>
    <text x="684"  y="540" fill="#808080" font-size="13" text-anchor="middle">evidence pack</text>
    <!-- 4 Schematic -->
    <rect x="816"  y="436" width="200" height="130" rx="5" fill="#191919" stroke="#3a3a3a" stroke-width="1.5"/>
    <text x="916"  y="486" fill="#6A6A6A" font-size="13" text-anchor="middle">04</text>
    <text x="916"  y="514" fill="#EFEFEF" font-size="19" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="500">Schematic</text>
    <text x="916"  y="540" fill="#808080" font-size="13" text-anchor="middle">generation</text>
    <!-- 5 Cost -->
    <rect x="1048" y="436" width="200" height="130" rx="5" fill="#191919" stroke="#3a3a3a" stroke-width="1.5"/>
    <text x="1148" y="486" fill="#6A6A6A" font-size="13" text-anchor="middle">05</text>
    <text x="1148" y="514" fill="#EFEFEF" font-size="19" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="500">Cost</text>
    <text x="1148" y="540" fill="#808080" font-size="13" text-anchor="middle">build-up</text>
    <!-- 6 Standards -->
    <rect x="1280" y="436" width="200" height="130" rx="5" fill="#191919" stroke="#3a3a3a" stroke-width="1.5"/>
    <text x="1380" y="486" fill="#6A6A6A" font-size="13" text-anchor="middle">06</text>
    <text x="1380" y="514" fill="#EFEFEF" font-size="19" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="500">Standards</text>
    <text x="1380" y="540" fill="#808080" font-size="13" text-anchor="middle">checker</text>
  </g>

  <!-- data-flow arrows between agents -->
  <g stroke="#5B8FE8" stroke-width="2">
    <line x1="322"  y1="501" x2="349"  y2="501" marker-end="url(#arrow)"/>
    <line x1="554"  y1="501" x2="581"  y2="501" marker-end="url(#arrow)"/>
    <line x1="786"  y1="501" x2="813"  y2="501" marker-end="url(#arrow)"/>
    <line x1="1018" y1="501" x2="1045" y2="501" marker-end="url(#arrow)"/>
    <line x1="1250" y1="501" x2="1277" y2="501" marker-end="url(#arrow)"/>
  </g>

  <!-- knowledge layer feeding the agents -->
  <rect x="120" y="624" width="1360" height="78" rx="6" fill="#191919" stroke="#272727" stroke-width="2"/>
  <text x="148" y="660" fill="#C8A96E" font-family="'JetBrains Mono', monospace" font-size="17" letter-spacing="3">KNOWLEDGE LAYER · RAG WITH CITATIONS</text>
  <text x="148" y="686" fill="#9A9A9A" font-size="19">Source-grounded answers. Agents retrieve and cite, they do not invent.</text>
  <g stroke="#6A6A6A" stroke-width="1.3" stroke-dasharray="3 5" opacity="0.6">
    <line x1="452"  y1="624" x2="452"  y2="590" marker-end="url(#arrowG)"/>
    <line x1="916"  y1="624" x2="916"  y2="590" marker-end="url(#arrowG)"/>
    <line x1="1380" y1="624" x2="1380" y2="590" marker-end="url(#arrowG)"/>
  </g>

  <!-- human gate -->
  <rect x="120" y="742" width="1360" height="74" rx="6" fill="#1c1810" stroke="#C8A96E" stroke-width="2"/>
  <text x="148" y="778" fill="#C8A96E" font-family="'JetBrains Mono', monospace" font-size="17" letter-spacing="3">HUMAN-IN-THE-LOOP</text>
  <text x="148" y="802" fill="#EFEFEF" font-size="20">Every AI output is advisory. A human reviews the prepared case and makes the decision.</text>

  <!-- footer -->
  <text x="120" y="868" fill="#6A6A6A" font-family="'JetBrains Mono', monospace" font-size="16">AWS Bedrock · Bedrock AgentCore · Step Functions · Lambda</text>
  <text x="1480" y="868" fill="#6A6A6A" font-family="'JetBrains Mono', monospace" font-size="16" text-anchor="end">AWS Think Tank 2026</text>
</svg>
